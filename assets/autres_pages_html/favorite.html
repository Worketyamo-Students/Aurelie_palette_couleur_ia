    <ul id="menu" class="hidden md:flex h-[10rem] w-[50rem] list-none flex items-center justify-around text-text text-[1.4rem] xl:text-[2rem] font-main font-bold *:hover:cursor-pointer *:hover:text-banner *:hover:border-b-[0.5rem]">
      <li><a href="../../index.html">Home Page</a></li>
      <li><a href="generator.html">Generator</a></li>
      <li><a href="favorite.html">My Favorites</a></li>
      <li><a href="premium.html">Premium</a></li>

    <div id="hamburgerBtn"  class="block md:hidden cursor-pointer" >
      <img height="30" width="35" src="../images/hamburger.svg" alt="hamburger">

  <!--favoris-->
  <section class="bg-grey-background min-h-screen w-full mt-[3rem] pb-[2rem] flex flex-col xl:px-[5rem] px-[1.8rem]">
    <h1 class="text-[1.8rem] xl:text-[3rem] mt-[4rem] text-text font-main font-bold">My saved palettes</h1>

    <div class="flex flex-col xl:flex-row h-auto xl:w-full w-[34rem] mt-[1rem] gap-y-[2.5rem] xl:gap-x-[10rem]">
      <div class="flex flex-col gap-y-[2rem] justify-center items-center xl:h-[26rem] h-[18rem] w-full bg-white-background xl:px-[5rem] px-[1.8rem] rounded-lg">
        <h2 class="h-auto text-[1.4rem] xl:text-[2rem] text-text font-secondary font-semibold">Keyword: nature</h2>

        <div class="flex justify-between w-full h-auto">
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
        </div>

        <div class="flex h-auto w-full justify-between">
          <buton class="bg-secondary flex justify-center items-center text-white text-[1.8rem] xl:w-[18rem] w-[14rem] xl:h-[5rem] h-[4rem] rounded-xl text-text font-main font-bold">Rename</buton>
          <buton class="bg-alert flex justify-center items-center text-white-background text-[1.8rem] xl:w-[18rem] w-[14rem] xl:h-[5rem] h-[4rem] rounded-xl text-text font-main font-bold">Delete</buton>
        </div>
      </div>


      <div class="flex flex-col gap-y-[2rem] justify-center items-center xl:h-[26rem] h-[18rem] w-full bg-white-background xl:px-[5rem] px-[1.8rem] rounded-lg">
        <h2 class="h-auto text-[1.4rem] xl:text-[2rem] text-text font-secondary font-semibold">Keyword: sun</h2>

        <div class="flex justify-between w-full h-auto">
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
          <div class="xl:h-[8rem] h-[6rem] xl:w-[8rem] w-[6rem] rounded-full bg-text"></div>
        </div>

        <div class="flex h-auto w-full justify-between">
          <buton class="bg-secondary flex justify-center items-center text-white text-[1.8rem] xl:w-[18rem] w-[14rem] xl:h-[5rem] h-[4rem] rounded-xl text-text font-main font-bold">Rename</buton>
          <buton class="bg-alert flex justify-center items-center text-white-background text-[1.8rem] xl:w-[18rem] w-[14rem] xl:h-[5rem] h-[4rem] rounded-xl text-text font-main font-bold">Delete</buton>
        </div>
      </div>

    </div>
  </section>

  <script>

    //gestion hamburger
    const btn = document.getElementById("hamburgerBtn");
    const menu = document.getElementById("menu");

    btn.addEventListener("click", () => {
      
      if (menu.classList.contains("hidden")) {
        menu.classList.remove("hidden");
        menu.classList.add("absolute", "top-full", "justify-center","items-center","gap-y-[2rem]","shadow-lg","rounded-xl", "h-[18rem]", "right-0", "w-[52%]", "bg-white-background", "flex-col", "font-regular");
      } else {
        menu.classList.add("hidden");
        menu.classList.remove("absolute", "top-full", "justify-center","items-center","gap-y-[2rem]","shadow-lg","rounded-xl","h-[18rem]", "right-0", "w-[52%]", "bg-white-background", "flex-col","font-regular");
      }
    });

  </script>
  
</body>
</html>
