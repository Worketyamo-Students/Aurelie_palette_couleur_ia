<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" sizes="32*32" href="../images/palette_logo.png">
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <title>Log in</title>

    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-shadow_border:#BBBBBB;
        --color-primary:#3D0066;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
        --color-text-secondary:#AAAAAA;
      }
    </style>
</head>
<body class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border">
  <!--header-->
  <header class="h-auto w-full lg:pl-[5rem]">
    <a href="../../index.html"><img class="lg:h-[10rem] lg:w-[18rem]" src="../images/palette_logo_2.svg" alt="palette_logo_2"></a>
  </header>
  <!--form-->
  <section class="lg:px-[5rem] px-[1.8rem] mt-[5rem] flex flex-col  lg:items-center gap-y-[1rem]">
    <h1 class="lg:text-[3rem] text-[1.8rem]  text-text font-main font-bold">Log  into  your  account</h1>
    <form class="flex flex-col shadow-lg rounded-lg lg:w-[50rem] w-auto h-[42rem] xl:h-[40rem] justify-center items-center">
      <label for="email"><input class="border-shadow_border border-[0.1rem] h-[4rem] rounded-lg lg:w-[40rem] w-[30rem] pl-[1.8rem] text-text text-[1.4rem] font-secondary font-semibold" type="email" name="email" id="email" placeholder="E-mail address"></label>
      <label for="password"><input class="bg-[url(../images/eye-closed.svg)] bg-no-repeat  bg-[right_1.8rem_center] bg-auto pr-[1.8rem] border-shadow_border border-[0.1rem] h-[4rem] rounded-xl lg:w-[40rem] w-[30rem] pl-[1.8rem] text-text text-[1.4rem] font-secondary font-semibold mt-[3rem]" type="password" name="password" id="password" placeholder="Password"></label>

      <button class="mt-[3rem] bg-primary text-white-background text-[1.8rem] font-main font-bold h-[4rem] rounded-xl lg:w-[40rem] w-[30rem] flex items-center justify-center cursor-pointer"  type="submit">Log in</button>
      <h1 class="mt-[3rem] text-center font-secondary font-bold text-[1.8rem] text-text-secondary">_Or_</h1>
      <button class="mt-[3rem] flex items-center justify-center border-shadow_border border-[0.1rem] h-[4rem] rounded-xl lg:w-[40rem] w-[30rem] cursor-pointer"><img src="../images/logo_google.svg" alt="logo_google"></button>
    </form>
  </section>
  
</body>
</html>
