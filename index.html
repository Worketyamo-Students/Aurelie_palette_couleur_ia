<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="icon" type="image/png" sizes="32*32" href="assets/images/palette_logo.png"> -->
    <link rel="stylesheet" type="text/css" href="assets/css/index.css">
    <title>Palette AI</title>

    <style type="text/tailwindcss">
      @theme {
        --font-main:"Plus Jakarta Sans", sans-serif;
        --font-secondary: "Nunito Sans", sans-serif;
        --color-banner:#5C0099;
        --color-primary:#3D0066;
        --color-hero:#D796FA;
        --color-white-background:#FFFFFF;
        --color-text:#03071E;
      }
    </style>
</head>
<body class="bg-white-background overflow-hidden h-screen w-screen px-0 py-0 border-0 box-border">
  <header class="h-auto w-full">
    <img height="52" width="150" src="assets/images/palette_logo_2.svg" alt="palette_logo_2">
  </header>

  <section class="bg-banner h-[20rem] w-full flex items-center justify-center mt-[1.5rem]">
    <div class="text-white-background flex flex-col items-start w-[30rem] h-[13rem]">
      <h1 class="text-[1.8rem]  font-secondary font-bold">Create your perfect color palettes with AI  🌈</h1><br>
      <p class="text-[1.4rem]  font-secondary font-semibold">Enter a keyword (nature, beach, night ...) and <br> let our AI generates the palette that inspires <br>you.</p>
    </div>
  </section>

  <section class=" bg-yellow-400 flex flex-col items-center justify-center h-[17rem]">
    <div class="text-main text-[1.8rem] flex flex-col justify-between h-[12rem] px-[1.8rem] w-full">
      <button class="bg-primary text-white-background text-[1.8rem] font-main font-bold h-[4.8rem] rounded-xl">Sign  up</button>
      <button class="bg-white-background text-primary text-[1.8rem] font-main font-bold border-[0.1rem] border-text h-[4.8rem] rounded-xl">Log  in</button>
    </div>
  </section>

</body>
</html>
